<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520" role="img" aria-label="mirror-design mascot: a lazy developer reclining, copying a UI from a mirror with Ctrl+C and pasting it to their screen with Ctrl+V">
  <style>
    :root { color-scheme: light dark; }
    .ink   { fill:#0f172a; }
    .fig   { fill:#94a3b8; }
    .figD  { fill:#64748b; }
    .figL  { fill:#cbd5e1; }
    .skin  { fill:#c2cbd8; }
    .accent{ fill:#6d4bff; }
    .accentL{ fill:#b7a6ff; }
    .aline { stroke:#ffffff; opacity:.9; }
    .paper { fill:#ffffff; stroke:#cbd5e1; }
    .glassLine{ stroke:#ffffff; opacity:.85; }
    .cap   { fill:#ffffff; stroke:#cbd5e1; }
    .capTx { fill:#0f172a; }
    .txt   { fill:#0f172a; }
    .muted { fill:#64748b; }
    .stroke-ink{ stroke:#0f172a; }
    .chipBg{ fill:#0f172a; }
    .chipTx{ fill:#ffffff; }
    .shadow{ fill:#0f172a; opacity:.06; }
    .echo  { fill:#6d4bff; opacity:.14; }
    @media (prefers-color-scheme: dark){
      .ink{fill:#e2e8f0;} .fig{fill:#64748b;} .figD{fill:#475569;} .figL{fill:#94a3b8;}
      .skin{fill:#8896a8;} .accent{fill:#9d84ff;} .accentL{fill:#5a4aa8;}
      .paper{fill:#1e293b; stroke:#334155;} .glassLine{stroke:#e2e8f0; opacity:.7;}
      .cap{fill:#0f172a; stroke:#334155;} .capTx{fill:#e2e8f0;}
      .txt{fill:#e2e8f0;} .muted{fill:#94a3b8;} .stroke-ink{stroke:#e2e8f0;}
      .chipBg{fill:#e2e8f0;} .chipTx{fill:#0f172a;}
      .shadow{fill:#000000; opacity:.22;} .echo{fill:#9d84ff; opacity:.18;}
    }
  </style>

  <!-- floor shadow -->
  <ellipse class="shadow" cx="380" cy="452" rx="252" ry="26"/>

  <!-- beanbag -->
  <ellipse class="figD" cx="404" cy="392" rx="196" ry="92"/>
  <ellipse class="fig"  cx="404" cy="384" rx="196" ry="86"/>

  <!-- legs (reclined, extended left, knee bent) -->
  <g class="figD">
    <rect x="150" y="316" width="150" height="48" rx="24" transform="rotate(-7 225 340)"/>
  </g>
  <g class="fig">
    <rect x="120" y="322" width="120" height="44" rx="22" transform="rotate(10 180 344)"/>
  </g>
  <!-- socks/feet -->
  <ellipse class="figL" cx="126" cy="356" rx="20" ry="16" transform="rotate(10 126 356)"/>
  <ellipse class="figL" cx="150" cy="330" rx="20" ry="16" transform="rotate(10 150 330)"/>

  <!-- torso, reclined -->
  <ellipse class="figD" cx="384" cy="330" rx="132" ry="66" transform="rotate(-15 384 330)"/>
  <!-- lap laptop rests here -->

  <!-- right arm reaching down to laptop (Ctrl+V) -->
  <path class="fig" d="M372 300 q60 26 92 62 q10 12 -6 22 q-18 10 -30 -6 q-28 -34 -74 -50 q-16 -6 -6 -22 q10 -14 24 -6 Z"/>

  <!-- left arm raised, holding the hand mirror (Ctrl+C) -->
  <path class="figD" d="M330 300 q-14 -70 22 -118 q10 -14 24 -4 q12 10 2 24 q-28 40 -18 96 q4 18 -14 20 q-16 2 -16 -18 Z"/>

  <!-- neck -->
  <rect class="skin" x="300" y="288" width="40" height="34" rx="16" transform="rotate(-10 320 305)"/>

  <!-- head, resting back -->
  <circle class="skin" cx="292" cy="256" r="62"/>
  <!-- hair -->
  <path class="ink" d="M238 246 q-14 -66 52 -74 q60 -6 66 44 q2 16 -6 24 q-4 -40 -50 -40 q-52 0 -50 48 q-6 -2 -12 -2 Z"/>
  <!-- glasses (dev) -->
  <g fill="none" class="stroke-ink" stroke-width="4">
    <circle cx="276" cy="258" r="15"/>
    <circle cx="316" cy="256" r="15"/>
    <path d="M291 257 h10"/>
  </g>
  <!-- chill closed eyes behind glasses -->
  <path class="ink" d="M270 260 q6 5 12 0"/>
  <path class="ink" d="M310 258 q6 5 12 0"/>
  <!-- easy smile -->
  <path class="ink" d="M286 284 q12 9 24 1" fill="none" stroke-width="4" stroke-linecap="round"/>
  <!-- cheek -->
  <circle class="accentL" cx="264" cy="278" r="7" opacity=".7"/>

  <!-- Zzz (lazy) -->
  <g class="muted" font-family="ui-monospace, Menlo, monospace" font-weight="700">
    <text x="352" y="196" font-size="18">z</text>
    <text x="374" y="176" font-size="24">z</text>
    <text x="402" y="150" font-size="30">Z</text>
  </g>

  <!-- ===== HAND MIRROR (source: it copies from here) ===== -->
  <!-- echo behind the mirror = reflection/repeat motif -->
  <circle class="echo" cx="196" cy="150" r="66"/>
  <!-- handle -->
  <rect class="figD" x="196" y="196" width="18" height="70" rx="9" transform="rotate(24 205 231)"/>
  <!-- frame -->
  <circle class="figD" cx="184" cy="146" r="60"/>
  <circle class="fig"  cx="184" cy="146" r="60" opacity="0"/>
  <!-- glass -->
  <circle class="accent" cx="184" cy="146" r="46"/>
  <!-- reflected wireframe (the existing screen) -->
  <g class="glassLine" stroke-width="4" stroke-linecap="round">
    <path d="M160 126 h48"/>
    <path d="M160 146 h34"/>
    <path d="M160 164 h44"/>
  </g>
  <!-- glass shine -->
  <path d="M156 116 a46 46 0 0 1 20 -8" fill="none" stroke="#ffffff" stroke-width="5" opacity=".5" stroke-linecap="round"/>

  <!-- ===== LAPTOP (target: it pastes to here) ===== -->
  <!-- keyboard base -->
  <path class="figD" d="M430 388 h140 l14 20 h-168 Z"/>
  <rect class="fig" x="440" y="384" width="120" height="10" rx="3"/>
  <!-- screen: accent fill so the pasted wireframe reads as the copy of the mirror -->
  <rect class="figD" x="452" y="330" width="98" height="58" rx="7"/>
  <rect class="accent" x="456" y="334" width="90" height="50" rx="5"/>
  <!-- pasted wireframe (identical to the mirror's = the copy) -->
  <g class="aline" stroke-width="4" stroke-linecap="round">
    <path d="M470 350 h48"/>
    <path d="M470 362 h34"/>
    <path d="M470 374 h44"/>
  </g>

  <!-- ===== keycaps ===== -->
  <!-- Ctrl+C near the mirror hand -->
  <g transform="translate(250 92)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="700">
    <rect class="cap" x="0"  y="0" width="44" height="26" rx="6" stroke-width="2"/>
    <text x="22" y="18" text-anchor="middle" font-size="13" class="capTx">Ctrl</text>
    <text x="52" y="19" font-size="15" class="muted">+</text>
    <rect class="cap" x="66" y="0" width="28" height="26" rx="6" stroke-width="2"/>
    <text x="80" y="18" text-anchor="middle" font-size="14" class="capTx">C</text>
  </g>
  <!-- Ctrl+V near the laptop hand -->
  <g transform="translate(556 396)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="700">
    <rect class="cap" x="0"  y="0" width="44" height="26" rx="6" stroke-width="2"/>
    <text x="22" y="18" text-anchor="middle" font-size="13" class="capTx">Ctrl</text>
    <text x="52" y="19" font-size="15" class="muted">+</text>
    <rect class="cap" x="66" y="0" width="28" height="26" rx="6" stroke-width="2"/>
    <text x="80" y="18" text-anchor="middle" font-size="14" class="capTx">V</text>
  </g>

  <!-- creativity chip -->
  <g transform="translate(120 470)">
    <rect class="chipBg" x="0" y="0" width="176" height="30" rx="15"/>
    <text x="88" y="20" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" class="chipTx" letter-spacing="1">CREATIVITY&#160;0</text>
  </g>
</svg>
